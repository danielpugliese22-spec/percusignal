// Longitud máxima de tracks (para alinear reproducción)
function maxTrackLen() {
  return Math.max(0, ...INSTRUMENTS.map(i => (state.tracks[i.id]||[]).length));
}

// ═══════════════════════════════════════════════════════════════
//  CAPTURA — graba un compás en la pista del instrumento activo
//  insertAfter: índice en esa pista donde insertar (-1 = al final)
// ═══════════════════════════════════════════════════════════════
function captureCurrentPattern(insertAfter = -1) {
  if(isInstrumentLocked(activeInstrId)) { showPaywall('instrument'); return; }
  if(!canAddMeasure()) { showPaywall('measures'); return; }
  const pattern = fingerMaskToPattern(
    state.rightMask, state.leftMask,
    state.rightFist, state.leftFist,
    state.compas, state.subdiv
  );

  const measure = {
    pattern,
    rightMask:[...state.rightMask], leftMask:[...state.leftMask],
    rightFist:state.rightFist, leftFist:state.leftFist,
    compas: state.compas
  };

  const track = state.tracks[activeInstrId] || (state.tracks[activeInstrId] = []);
  const ia = state.pendingInsertAfter >= 0 ? state.pendingInsertAfter : (insertAfter === -2 ? -1 : insertAfter);
  state.pendingInsertAfter = -1;

  if(ia >= 0 && ia < track.length) {
    track.splice(ia + 1, 0, measure);
  } else {
    track.push(measure);
  }

  // Flash
  const flash = document.createElement('div');
  flash.className = 'flash'; document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 350);

  // Audio feedback
  initAudio();
  if(state.audioCtx.state==='suspended') state.audioCtx.resume();
  playConga(state.audioCtx.currentTime + 0.02, 1.0);

  rebuildScoreDisplay();
}
// Muestra las miniaturas de CADA pista en su propia fila horizontal
function renderTrackThumbs() {
  const scroll = document.getElementById('historyScroll');
  scroll.innerHTML = '';

  const hasAny = INSTRUMENTS.some(i => (state.tracks[i.id]||[]).length > 0);
  if(!hasAny) {
    scroll.innerHTML = `<div style="font-size:11px;color:#9a8878;
      font-family:var(--font-mono);padding:8px">
      Seleccioná un instrumento y capturá compases</div>`;
    return;
  }

  // Una fila por instrumento que tenga datos (o sea el activo)
  INSTRUMENTS.forEach(inst => {
    const track = state.tracks[inst.id] || [];
    if(track.length === 0 && inst.id !== activeInstrId) return;

    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;gap:6px;
      padding:4px 0;border-bottom:1px solid rgba(42,32,16,.1);min-width:max-content`;

    // Etiqueta del instrumento
    const lbl = document.createElement('div');
    lbl.style.cssText = `flex-shrink:0;width:72px;font-family:var(--font-mono);
      font-size:9px;font-weight:700;color:${inst.color};
      display:flex;align-items:center;gap:4px;padding:0 6px`;
    lbl.innerHTML = `<span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:${inst.color};color:#000;font-weight:700;font-size:11px;text-align:center;line-height:18px;margin-right:4px">${inst.iconSmall||'•'}</span><span>${inst.name.substring(0,5)}</span>`;
    row.appendChild(lbl);

    // Miniaturas de compases de esta pista
    track.forEach((m, idx) => {
      const isActive = inst.id === activeInstrId && idx === state.activeMeasure;
      const div = document.createElement('div');
      div.className = 'measure-thumb' + (isActive ? ' active' : '');
      div.dataset.instrId = inst.id;
      div.dataset.idx = idx;
      div.draggable = true;
      div.style.borderColor = isActive ? inst.color : '';

      const noteCount = m.pattern.filter(Boolean).length;
      const beats = m.pattern.length;
      const miniPat = m.pattern.slice(0,8).map(v =>
        `<span style="color:${v ? inst.color : 'rgba(42,32,16,.15)'}">●</span>`
      ).join('');

      div.innerHTML = `
        <div class="mt-number">
          <span style="cursor:grab;opacity:.4;font-size:9px;margin-right:3px">⠿</span>#${idx+1}
        </div>
        <div style="letter-spacing:1px;margin:2px 0;line-height:1">${miniPat}</div>
        <div class="mt-pattern">${noteCount}/${beats}</div>
        <div style="display:flex;gap:3px;margin-top:4px">
          <button class="thumb-btn" style="padding:2px 5px;font-size:9px"
            onclick="event.stopPropagation();insertMeasure('${inst.id}',${idx},'before')"
            title="Insertar antes">↑+</button>
          <button class="thumb-btn" style="padding:2px 5px;font-size:9px"
            onclick="event.stopPropagation();insertMeasure('${inst.id}',${idx},'after')"
            title="Insertar después">↓+</button>
          <button class="thumb-btn danger" style="padding:2px 5px;font-size:9px"
            onclick="event.stopPropagation();deleteMeasure('${inst.id}',${idx})"
            title="Borrar">×</button>
        </div>
      `;

      // Drag & drop dentro de la misma pista
      div.addEventListener('dragstart', e => {
        state.dragSrcIdx = idx;
        state.dragSrcInstr = inst.id;
        div.style.opacity = '0.4';
        e.dataTransfer.effectAllowed = 'move';
      });
      div.addEventListener('dragend', () => {
        div.style.opacity = '';
        document.querySelectorAll('.measure-thumb')
          .forEach(el => el.classList.remove('drag-over-left','drag-over-right'));
      });
      div.addEventListener('dragover', e => {
        if(state.dragSrcInstr !== inst.id) return; // solo dentro de la misma pista
        e.preventDefault();
        const mid = div.getBoundingClientRect().left + div.offsetWidth/2;
        div.classList.toggle('drag-over-left',  e.clientX < mid);
        div.classList.toggle('drag-over-right', e.clientX >= mid);
      });
      div.addEventListener('dragleave', () =>
        div.classList.remove('drag-over-left','drag-over-right'));
      div.addEventListener('drop', e => {
        e.preventDefault();
        div.classList.remove('drag-over-left','drag-over-right');
        const src = state.dragSrcIdx;
        if(state.dragSrcInstr !== inst.id || src === undefined || src === idx) return;
        const before = e.clientX < div.getBoundingClientRect().left + div.offsetWidth/2;
        let dest = before ? idx : idx+1;
        if(src < dest) dest--;
        const moved = track.splice(src,1)[0];
        track.splice(dest,0,moved);
        state.dragSrcIdx = undefined; state.dragSrcInstr = undefined;
        rebuildScoreDisplay();
      });
      div.addEventListener('click', () => {
        state.activeMeasure = idx;
        activeInstrId = inst.id;
        rebuildScoreDisplay();
      });

      row.appendChild(div);
    });

    // Botón "+" al final de la pista
    const addBtn = document.createElement('button');
    addBtn.style.cssText = `flex-shrink:0;padding:6px 10px;border:1.5px dashed ${inst.color};
      background:transparent;color:${inst.color};font-size:14px;border-radius:2px;
      cursor:pointer;opacity:.6;transition:.15s`;
    addBtn.textContent = '+';
    addBtn.title = `Agregar compás a ${inst.name}`;
    addBtn.onclick = () => {
      activeInstrId = inst.id;
      captureCurrentPattern(-1);
    };
    row.appendChild(addBtn);
    scroll.appendChild(row);
  });

  scroll.scrollLeft = scroll.scrollWidth;
}
// ═══════════════════════════════════════════════════════════════
//  PENTAGRAMA MULTI-PISTA
//  Una fila por instrumento. Cada columna = un compás de esa pista.
//  El compás "EN VIVO" se muestra siempre al final del instrumento activo.
// ═══════════════════════════════════════════════════════════════
function drawMultiTrackScore(canvas, tracks, livePat, compas, hlInfo={instrId:null,mi:-1,bi:-1}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || canvas.width;
  canvas.width = W;

  const activeInstrs = INSTRUMENTS.filter(inst =>
    (tracks[inst.id]||[]).length > 0 || inst.id === activeInstrId
  );
  if(!activeInstrs.length) activeInstrs.push(INSTRUMENTS[0]);

  const lm = 60, rm = 14;
  const trackH = 52;   // altura de cada pista (pentagrama simplificado)
  const trackGap = 14; // espacio entre pistas
  const minMW = 80;
  const mpr = Math.max(1, Math.floor((W - lm - rm) / minMW));

  // La altura total = una fila por instrumento activo
  // Cada instrumento se muestra en una banda horizontal
  const totalH = activeInstrs.length * (trackH + trackGap) + 20;
  canvas.height = totalH; canvas.style.height = totalH+'px';

  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, canvas.height);

  const diSlots = {
    '4/4':{ D:[0,1,2,3], I:[4,5,6,7] },
    '2/4':{ D:[0,1],     I:[2,3] },
    '3/4':{ D:[0,1,2],   I:[3,4,5] },
  };

  activeInstrs.forEach((inst, ii) => {
    const trackTop = 10 + ii * (trackH + trackGap);
    const track = tracks[inst.id] || [];
    const allM = [
      ...track.map(m => ({...m, isLive:false})),
      {pattern: inst.id===activeInstrId ? livePat : null, compas, isLive:true}
    ];
    const validM = allM.filter(m => m.pattern !== null);
    const mw = Math.min(120, (W - lm - rm) / Math.max(validM.length, 1));

    // ── Etiqueta del instrumento ──
    ctx.font = `bold 9px IBM Plex Mono,monospace`;
    ctx.fillStyle = muteState[inst.id] ? '#bbb' : inst.color;
    ctx.textAlign = 'right';
    ctx.fillText(inst.iconSmall || inst.name[0], lm - 38, trackTop + trackH/2 + 4);
    ctx.font = `bold 8px IBM Plex Mono,monospace`;
    ctx.fillText(inst.name.substring(0,4), lm - 4, trackTop + trackH/2 + 4);
    ctx.textAlign = 'left';

    // ── Línea central de la pista (como pentagrama de 1 línea) ──
    const lineY = trackTop + trackH/2;
    ctx.strokeStyle = muteState[inst.id] ? '#ddd' : `${inst.color}25`;
    ctx.lineWidth = 1;
    ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(lm, lineY); ctx.lineTo(lm + validM.length * mw, lineY); ctx.stroke();
    ctx.setLineDash([]);

    // ── Barra inicial ──
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(lm, trackTop+4); ctx.lineTo(lm, trackTop+trackH-4); ctx.stroke();

    // ── Compases ──
    validM.forEach((m, mi) => {
      if(!m.pattern) return;
      const isLive = m.isLive;
      const isHL = hlInfo.instrId === inst.id && hlInfo.mi === mi;
      const x0 = lm + mi * mw;
      const cmp = m.compas || compas;
      const slots = diSlots[cmp] || diSlots['4/4'];
      const beats = m.pattern.length;
      const noteSpacing = (mw - 4) / (beats + 1);

      // Fondo del compás
      if(isHL) {
        ctx.fillStyle = `${inst.color}20`;
        ctx.fillRect(x0, trackTop+2, mw-2, trackH-4);
      }
      if(isLive) {
        ctx.fillStyle = `${inst.color}14`;
        ctx.fillRect(x0, trackTop+2, mw-2, trackH-4);
      }

      // Número de compás (solo no-live)
      if(!isLive) {
        ctx.font = `bold 7px IBM Plex Mono,monospace`;
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.textAlign = 'center';
        ctx.fillText(`#${mi+1}`, x0 + mw/2, trackTop + 10);
        ctx.textAlign = 'left';
      } else {
        ctx.font = `bold 7px IBM Plex Mono,monospace`;
        ctx.fillStyle = inst.id === activeInstrId ? inst.color : '#bbb';
        ctx.textAlign = 'center';
        ctx.fillText('▶', x0 + mw/2, trackTop + 10);
        ctx.textAlign = 'left';
      }

      // Notas
      m.pattern.forEach((isNote, bi) => {
        const x = x0 + (bi+1)*noteSpacing;
        const isD = slots.D.includes(bi);
        const hlBeat = isHL && hlInfo.bi === bi;
        const nc = hlBeat ? '#ff6b00' : (muteState[inst.id] ? '#ccc' : inst.color);

        if(isNote) {
          ctx.save();
          if(hlBeat){ ctx.shadowColor='#ff6b00'; ctx.shadowBlur=8; }
          ctx.fillStyle = nc;
          ctx.beginPath();
          ctx.ellipse(x, lineY, 4.5, 3.5, -0.3, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
          ctx.strokeStyle = nc; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(x+4, lineY); ctx.lineTo(x+4, lineY-16); ctx.stroke();
          // Barra de unión
          if(bi < beats-1 && m.pattern[bi+1] && slots.D.includes(bi)===slots.D.includes(bi+1)) {
            const nx = x0 + (bi+2)*noteSpacing;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(x+4,lineY-16); ctx.lineTo(nx+4,lineY-16); ctx.stroke();
          } else {
            ctx.lineWidth = 1.2;
            ctx.beginPath(); ctx.moveTo(x+4,lineY-16); ctx.quadraticCurveTo(x+11,lineY-11,x+7,lineY-8); ctx.stroke();
          }
          // D/I label pequeño
          ctx.font = `bold 6px IBM Plex Mono,monospace`;
          ctx.fillStyle = isD ? `${inst.color}80` : `${inst.color}50`;
          ctx.textAlign = 'center';
          ctx.fillText(isD?'D':'I', x, lineY+14);
          ctx.textAlign = 'left';
        } else {
          // Silencio pequeño
          ctx.fillStyle = `${inst.color}55`;
          ctx.font = '9px serif'; ctx.textAlign='center';
          ctx.fillText('𝄾', x, lineY+4);
          ctx.textAlign='left';
        }
      });

      // Barra divisoria entre compases
      ctx.strokeStyle = 'rgba(42,32,16,.2)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x0+mw-1, trackTop+4); ctx.lineTo(x0+mw-1, trackTop+trackH-4); ctx.stroke();
    });

    // ── Barra final doble ──
    const endX = lm + validM.length * mw;
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(endX, trackTop+4); ctx.lineTo(endX, trackTop+trackH-4); ctx.stroke();
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(endX-3, trackTop+4); ctx.lineTo(endX-3, trackTop+trackH-4); ctx.stroke();

    // Loop indicator
    if(loopState[inst.id]) {
      ctx.font = `bold 9px IBM Plex Mono,monospace`;
      ctx.fillStyle = inst.color;
      ctx.fillText('↺', endX+4, trackTop+trackH/2+4);
    }
  });
}
function deleteMeasure(instrId, idx) {
  (state.tracks[instrId]||[]).splice(idx, 1);
  rebuildScoreDisplay();
}

// Insertar un compás DESPUÉS del índice dado (abre modal de captura)
function insertMeasure(idx, where) {
  // 'before' → insertAfter = idx-1  (o -1 si es el primero)
  // 'after'  → insertAfter = idx
  state.pendingInsertAfter = where === 'before' ? idx - 1 : idx;
  const label = where === 'before' ? `antes del #${idx+1}` : `después del #${idx+1}`;
  document.getElementById('insertAfterNum').textContent = label;
  document.getElementById('insertBanner').style.display = 'flex';
  document.getElementById('insertBanner').dataset.after = state.pendingInsertAfter;
}

// Mantener compatibilidad con llamadas antiguas
function insertAfterMeasure(idx) { insertMeasure(idx, 'after'); }

function confirmInsert() {
  const idx = parseInt(document.getElementById('insertBanner').dataset.after);
  captureCurrentPattern(idx);
  cancelInsert();
}

function cancelInsert() {
  state.pendingInsertAfter = -1;
  document.getElementById('insertBanner').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  RENDER SCORE — pentagrama acumulativo DOS FILAS (Der / Izq)
// ═══════════════════════════════════════════════════════════════
function rebuildScoreDisplay() {
  const _ml=maxTrackLen();
  ['iMeasures','iMeasures2'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=_ml; });
  renderTrackThumbs();
  redrawFullScore();
}

// Redibuja el pentagrama ÚNICO (una línea, modelo DIDI)
function redrawFullScore() {
  const canvas = document.getElementById('staffCanvas');
  const livePat = fingerMaskToPattern(
    state.rightMask, state.leftMask,
    state.rightFist, state.leftFist,
    state.compas, state.subdiv
  );
  drawMultiTrackScore(canvas, state.tracks, livePat, state.compas);
}

// ═══════════════════════════════════════════════════════════════
//  PENTAGRAMA MULTI-INSTRUMENTO — una fila por instrumento
// ═══════════════════════════════════════════════════════════════
function drawSingleLineScore(canvas, measures, livePat, compas, hlInfo={mi:-1,bi:-1}) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || canvas.width;
  canvas.width = W;

  // Qué instrumentos tienen al menos un compás grabado
  const activeInstrs = INSTRUMENTS.filter(inst =>
    measures.some(m => m.byInstr?.[inst.id]?.some(Boolean))
    || (inst.id === activeInstrId) // siempre mostrar el activo
  );
  if(activeInstrs.length === 0) activeInstrs.push(INSTRUMENTS[0]);

  const lm = 56, rm = 14;
  const rowH = 28;         // altura por fila de instrumento
  const instrH = activeInstrs.length * rowH + 14; // alto de un "sistema" (todos los instrs)
  const minMW = 110;
  const mpr = Math.max(1, Math.floor((W - lm - rm) / minMW));

  const allM = [
    ...measures.map(m => ({ ...m, isLive:false })),
    { byInstr:{ [activeInstrId]: livePat }, compas, isLive:true }
  ];

  const systemH = instrH + 30; // sistema + espacio
  const rows = Math.ceil(allM.length / mpr);
  canvas.height = rows * systemH + 16;
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, canvas.height);

  const diSlots = {
    '4/4': { D:[0,1,2,3], I:[4,5,6,7] },
    '2/4': { D:[0,1],     I:[2,3] },
    '3/4': { D:[0,1,2],   I:[3,4,5] },
  };

  for(let row=0; row < rows; row++) {
    const rowMs = allM.slice(row*mpr, (row+1)*mpr);
    const mw = (W - lm - rm) / mpr;
    const sysTop = 20 + row * systemH;

    // Línea horizontal de referencia por instrumento
    activeInstrs.forEach((inst, ii) => {
      const lineY = sysTop + ii * rowH + rowH/2;

      // Etiqueta instrumento
      ctx.font = `bold 9px IBM Plex Mono,monospace`;
      ctx.fillStyle = muteState[inst.id] ? '#bbb' : inst.color;
      ctx.textAlign = 'right';
      const loopTag = loopState[inst.id] ? ' ↺' : '';
      ctx.fillText((inst.iconSmall || '') + ' ' + inst.name.substring(0,4) + loopTag, lm - 4, lineY + 3);
      ctx.textAlign = 'left';

      // Línea de referencia
      ctx.strokeStyle = muteState[inst.id] ? '#ddd' : inst.color + '30';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,4]);
      ctx.beginPath(); ctx.moveTo(lm, lineY); ctx.lineTo(W-rm, lineY); ctx.stroke();
      ctx.setLineDash([]);
    });

    // Barra de inicio del sistema
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(lm, sysTop);
    ctx.lineTo(lm, sysTop + activeInstrs.length * rowH);
    ctx.stroke();

    // Números de tiempo encima del primer compás
    rowMs.forEach((m, mi_local) => {
      const mi_global = row*mpr + mi_local;
      const isLive = m.isLive;
      const x0 = lm + mi_local * mw;
      const mwInner = mw - 6;
      const cmp = m.compas || compas;
      const slots = diSlots[cmp] || diSlots['4/4'];
      const beats = isLive ? (livePat?.length || 8) : (Object.values(m.byInstr||{})[0]?.length || 8);
      const noteSpacing = mwInner / (beats + 1);
      const beatNames = cmp==='4/4'?['1','y','2','y','3','y','4','y']
        :cmp==='2/4'?['1','y','2','y']:['1','y','a','2','y','a'];

      // Fondo highlight
      if(mi_global === hlInfo.mi) {
        ctx.fillStyle='rgba(200,66,10,0.06)';
        ctx.fillRect(x0, sysTop-4, mwInner+6, activeInstrs.length*rowH+8);
      }
      if(isLive) {
        ctx.fillStyle='rgba(26,92,138,0.04)';
        ctx.fillRect(x0, sysTop-4, mwInner+6, activeInstrs.length*rowH+8);
      }

      // Número de compás
      ctx.font='bold 8px IBM Plex Mono,monospace';
      ctx.fillStyle = isLive ? '#1a5c8a' : '#9a8878';
      ctx.textAlign='center';
      ctx.fillText(isLive ? '▶' : `#${mi_global+1}`, x0+mwInner/2, sysTop-6);
      ctx.textAlign='left';

      // Etiquetas D/I y números de tiempo
      for(let bi=0; bi<beats; bi++) {
        const x = x0 + (bi+1)*noteSpacing;
        const isD = slots.D.includes(bi);
        ctx.font='bold 7px IBM Plex Mono,monospace';
        ctx.fillStyle = isD ? 'rgba(200,66,10,0.45)' : 'rgba(26,92,138,0.45)';
        ctx.textAlign='center';
        ctx.fillText(isD?'D':'I', x, sysTop-14);
        ctx.font='italic 8px Playfair Display,serif';
        ctx.fillStyle='rgba(138,122,96,0.55)';
        ctx.fillText(beatNames[bi]||bi+1, x, sysTop-5);
        ctx.textAlign='left';
      }

      // Notas por instrumento
      activeInstrs.forEach((inst, ii) => {
        if(muteState[inst.id]) return;
        const lineY = sysTop + ii * rowH + rowH/2;
        const pat = isLive && inst.id === activeInstrId
          ? livePat
          : m.byInstr?.[inst.id];
        if(!pat) return;

        let prevNoteX = null;
        pat.forEach((isNote, bi) => {
          const x = x0 + (bi+1)*noteSpacing;
          const isHL = mi_global===hlInfo.mi && bi===hlInfo.bi;
          const nc = isHL ? '#ff6b00' : inst.color;

          if(isNote) {
            // Nota: cabeza rellena
            ctx.save();
            if(isHL){ ctx.shadowColor='#ff6b00'; ctx.shadowBlur=8; }
            ctx.fillStyle = nc;
            ctx.beginPath(); ctx.ellipse(x, lineY, 5.5, 4, -0.3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            // Plica
            ctx.strokeStyle=nc; ctx.lineWidth=1.3;
            ctx.beginPath(); ctx.moveTo(x+5, lineY); ctx.lineTo(x+5, lineY-18); ctx.stroke();
            // Barra de unión a la nota siguiente si existe
            if(bi < beats-1 && pat[bi+1]) {
              const nx2 = x0 + (bi+2)*noteSpacing;
              ctx.lineWidth=2.2;
              ctx.beginPath(); ctx.moveTo(x+5, lineY-18); ctx.lineTo(nx2+5, lineY-18); ctx.stroke();
            } else {
              ctx.lineWidth=1.3;
              ctx.beginPath(); ctx.moveTo(x+5,lineY-18); ctx.quadraticCurveTo(x+13,lineY-13,x+8,lineY-9); ctx.stroke();
            }
          } else {
            // Silencio pequeño
            ctx.fillStyle=`${inst.color}35`;
            ctx.font='10px serif'; ctx.textAlign='center';
            ctx.fillText('𝄾', x, lineY+4);
            ctx.textAlign='left';
          }
        });
      });

      // Barra divisoria entre compases
      ctx.strokeStyle='rgba(42,32,16,0.25)'; ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(x0+mwInner+6, sysTop);
      ctx.lineTo(x0+mwInner+6, sysTop+activeInstrs.length*rowH);
      ctx.stroke();
    });

    // Barra final doble
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W-rm, sysTop); ctx.lineTo(W-rm, sysTop+activeInstrs.length*rowH); ctx.stroke();
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(W-rm-4, sysTop); ctx.lineTo(W-rm-4, sysTop+activeInstrs.length*rowH); ctx.stroke();
  }
// Actualiza drawMeasure para aceptar color personalizado
// (ya definido arriba, lo sobreescribimos con soporte de color)
}
// drawMeasure con soporte de color personalizado
function drawMeasure(ctx, pattern, compas, x0, availW, staffTop, lineGap, highlightBeat=-1, isActive=false, color='#1a1206') {
  if(!pattern || pattern.length===0) return;
  const beats = pattern.length;
  const noteSpacing = availW / (beats + 1);
  const noteY = [
    staffTop+lineGap*4, staffTop+lineGap*3.5, staffTop+lineGap*3,
    staffTop+lineGap*2.5, staffTop+lineGap*2, staffTop+lineGap*1.5,
    staffTop+lineGap*1, staffTop+lineGap*0.5
  ];
  const beatNames = compas==='4/4'?['1','y','2','y','3','y','4','y']
    :compas==='2/4'?['1','y','2','y']:['1','y','a','2','y','a'];

  pattern.forEach((isNote, bi) => {
    const x = x0 + (bi+1)*noteSpacing;
    const ny = noteY[bi % noteY.length];
    const isHL = bi === highlightBeat;
    const nc = isHL ? '#c8420a' : color;

    ctx.font='italic 9px Playfair Display,serif';
    ctx.fillStyle = isHL ? '#c8420a' : 'rgba(138,122,96,0.6)';
    ctx.textAlign='center';
    ctx.fillText(beatNames[bi]||bi+1, x, staffTop-7);
    ctx.textAlign='left';

    if(isNote){
      ctx.save();
      if(isHL){ctx.shadowColor='#c8420a';ctx.shadowBlur=8;}
      ctx.fillStyle=nc;
      ctx.beginPath(); ctx.ellipse(x,ny,5.5,4,-0.3,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.strokeStyle=nc; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(x+5,ny); ctx.lineTo(x+5,ny-26); ctx.stroke();
      if(bi<beats-1&&pattern[bi+1]){
        const nx2=x0+(bi+2)*noteSpacing;
        ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(x+5,ny-26); ctx.lineTo(nx2+5,noteY[(bi+1)%noteY.length]-26); ctx.stroke();
      } else {
        ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.moveTo(x+5,ny-26); ctx.quadraticCurveTo(x+16,ny-19,x+9,ny-14); ctx.stroke();
      }
    } else {
      ctx.fillStyle=isHL?'rgba(200,66,10,0.4)':'rgba(42,32,16,0.18)';
      ctx.font='14px serif'; ctx.textAlign='center';
      ctx.fillText('𝄾', x, staffTop+lineGap*2+3);
      ctx.textAlign='left';
    }
  });
};

// Lista de comandos para mostrar al usuario
const VOICE_COMMANDS = [
  { words: ['ya','dale','captura'],         label: 'capturar', icon: '⊕' },
  { words: ['borra','elimina'],              label: 'borrar',   icon: '✕' },
  { words: ['play','toca'],                  label: 'tocar',    icon: '▶' },
  { words: ['stop','para'],                  label: 'parar',    icon: '■' },
  { words: ['limpiar','reset'],              label: 'limpiar',  icon: '⌫' },
];

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { showVoiceToast('Tu navegador no soporta voz. Usá Chrome.', 'error'); return; }

  voiceRecognition = new SR();
  voiceRecognition.lang = 'es-AR';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true; // Para feedback en tiempo real

  voiceRecognition.onresult = (e) => {
    const last = e.results[e.results.length-1];
    const txt = last[0].transcript.trim().toLowerCase();

    if(!last.isFinal) {
      // Mostrar lo que está escuchando en tiempo real
      updateInterimText(txt);
      return;
    }

    updateInterimText('');
    console.log('Voz:', txt);

    let matched = false;

    if(/\b(ya|dale|toma|captura|ahora|siguiente|next|save|graba)\b/.test(txt)) {
      captureCurrentPattern(state.pendingInsertAfter >= 0 ? state.pendingInsertAfter : -1);
      state.pendingInsertAfter = -1;
      document.getElementById('insertBanner').style.display='none';
      showVoiceToast('⊕ Capturado', 'success', txt);
      matched = true;
    }
    if(!matched && /\b(borra|elimina|delete|quita)\b/.test(txt)) {
      const _t = state.tracks[activeInstrId];
      if(_t && _t.length > 0) { 
        deleteMeasure(activeInstrId, _t.length-1); 
        showVoiceToast('✕ Borrado', 'success', txt);
      }
      matched = true;
    }
    if(!matched && /\b(toca|play|reproducir)\b/.test(txt)) { 
      playScore(); 
      showVoiceToast('▶ Tocando', 'success', txt); 
      matched = true;
    }
    if(!matched && /\b(stop|para|detener)\b/.test(txt)) { 
      stopScore(); 
      showVoiceToast('■ Detenido', 'success', txt); 
      matched = true;
    }
    if(!matched && /\b(limpia|limpiar|clear|reset)\b/.test(txt)) { 
      clearScore(); 
      showVoiceToast('⌫ Limpiado', 'success', txt); 
      matched = true;
    }

    if(!matched && txt.length > 1) {
      showVoiceToast('No entendí', 'warning', txt);
    }
  };

  voiceRecognition.onerror = (e) => {
    if(e.error === 'no-speech' || e.error === 'aborted') return;
    if(e.error === 'not-allowed') {
      showVoiceToast('Permiso de micrófono denegado', 'error');
      voiceActive = false;
      updateVoiceUI();
      return;
    }
    console.warn('Voz error:', e.error);
  };

  voiceRecognition.onend = () => {
    if(voiceActive) {
      try { voiceRecognition.start(); } catch(e) {}
    }
  };
}

// Conectar al micrófono para visualizar el nivel de audio
async function startMicLevelMonitor() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    voiceAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = voiceAudioCtx.createMediaStreamSource(stream);
    voiceAnalyser = voiceAudioCtx.createAnalyser();
    voiceAnalyser.fftSize = 256;
    source.connect(voiceAnalyser);
    animateMicLevel();
  } catch(e) {
    console.warn('Mic monitor failed:', e);
  }
}

function stopMicLevelMonitor() {
  if(voiceAudioCtx) {
    voiceAudioCtx.close();
    voiceAudioCtx = null;
  }
  if(voiceLevelAnim) cancelAnimationFrame(voiceLevelAnim);
  voiceLevelAnim = null;
  const bars = document.querySelectorAll('.voice-bar');
  bars.forEach(b => b.style.height = '4px');
}

function animateMicLevel() {
  if(!voiceAnalyser || !voiceActive) return;
  const data = new Uint8Array(voiceAnalyser.frequencyBinCount);
  voiceAnalyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b) => a+b, 0) / data.length;
  const norm = Math.min(1, avg / 80);
  
  const bars = document.querySelectorAll('.voice-bar');
  bars.forEach((b, i) => {
    const height = Math.max(4, Math.min(16, norm * (4 + Math.random()*16)));
    b.style.height = height + 'px';
    b.style.opacity = 0.4 + norm * 0.6;
  });

  voiceLevelAnim = requestAnimationFrame(animateMicLevel);
}

// Actualizar el texto interim (lo que está escuchando en tiempo real)
function updateInterimText(txt) {
  const el = document.getElementById('voiceInterim');
  if(!el) return;
  if(txt) {
    el.textContent = '"' + txt + '"';
    el.style.opacity = '1';
  } else {
    el.style.opacity = '0';
  }
}

function toggleVoice() {
  if(!voiceRecognition) initVoice();
  if(!voiceRecognition) return;

  // Primera vez: mostrar onboarding
  if(!voiceActive && !localStorage.getItem('voice_onboarded')) {
    showVoiceOnboarding();
    return;
  }

  voiceActive = !voiceActive;
  updateVoiceUI();

  if(voiceActive) {
    try { 
      voiceRecognition.start(); 
      startMicLevelMonitor();
      showVoicePanel();
    } catch(e) { console.warn(e); }
  } else {
    voiceRecognition.stop();
    stopMicLevelMonitor();
    hideVoicePanel();
  }
}

// ═══════════════════════════════════════════════════════════════
//  MEDIAPIPE HANDS — dos manos
// ═══════════════════════════════════════════════════════════════
async function startCamera() {
  document.getElementById('camOvl').classList.add('hidden');
  document.getElementById('stxt').textContent='Cargando…';

  const video=document.getElementById('videoEl');
  const canvas=document.getElementById('overlayCanvas');
  const ctx2=canvas.getContext('2d');

  try {
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({
      maxNumHands: 2,                  // ← ambas manos
      modelComplexity: 1,
      minDetectionConfidence: .75,
      minTrackingConfidence: .6
    });

    hands.onResults(res=>{
      // FPS
      const now=performance.now();
      state.frames++;
      if(now-state.lastFT>=1000){
        state.fps=state.frames; state.frames=0; state.lastFT=now;
        document.getElementById('fpstxt').textContent=`${state.fps} fps`;
      }

      canvas.width=video.videoWidth||640; canvas.height=video.videoHeight||480;
      ctx2.clearRect(0,0,canvas.width,canvas.height);

      // Resetear estado de manos
      state.rightMask = [false,false,false,false];
      state.leftMask  = [false,false,false,false];
      state.rightFist = false;
      state.leftFist  = false;

      if(res.multiHandLandmarks?.length > 0) {
        res.multiHandLandmarks.forEach((lm, idx) => {
          // MediaPipe reporta handedness desde la perspectiva de la cámara (espejada)
          // "Right" en MediaPipe = mano IZQUIERDA real del usuario (por el espejo del video)
          // "Left"  en MediaPipe = mano DERECHA real del usuario
          const mpLabel = res.multiHandedness?.[idx]?.label || 'Right';
          const isUserRight = (mpLabel === 'Left');  // espejo invertido

          const fist = isFist(lm);
          const mask4 = fist ? [false,false,false,false] : detectFingers(lm);
          const conf = fingerConfidence(lm);

          const color = isUserRight ? '#c8420a' : '#1a5c8a';
          drawHand(ctx2, lm, canvas.width, canvas.height, mask4, fist, color);

          if(isUserRight) {
            state.rightMask = mask4;
            state.rightFist = fist;
          } else {
            state.leftMask = mask4;
            state.leftFist = fist;
          }
        });

        const pattern = fingerMaskToPattern(
          state.rightMask, state.leftMask,
          state.rightFist, state.leftFist,
          state.compas, state.subdiv
        );

        // Combinar masks para display (mano derecha primero, luego izquierda)
        const combinedMask = [...state.rightMask, ...state.leftMask];
        updateFingerDisplay(state.rightMask, state.leftMask, state.rightFist, state.leftFist);
        redrawFullScore();

        const handsDetected = res.multiHandLandmarks.length;
        document.getElementById('handBadge').style.display='flex';
        document.getElementById('hbFingers').textContent =
          (state.rightFist ? '✊' : state.rightMask.map(u=>u?'●':'○').join('')) +
          ' | ' +
          (state.leftFist  ? '✊' : state.leftMask.map(u=>u?'●':'○').join(''));
        document.getElementById('hbNote').textContent =
          pattern.filter(Boolean).length + ' notas';
        document.getElementById('iHand').textContent = handsDetected===2?'Ambas':`${handsDetected}`;
        document.getElementById('iCount').textContent =
          [...state.rightMask,...state.leftMask].filter(Boolean).length;
        // (iPattern removed)
        document.getElementById('btnCapture').disabled=false;

        const cnt=pattern.filter(Boolean).length;
        // (ab-bar removed)

      } else {
        document.getElementById('handBadge').style.display='none';
        document.getElementById('iHand').textContent='—';
        document.getElementById('iCount').textContent='0';
        // (ab-bar removed)
        updateFingerDisplay([false,false,false,false],[false,false,false,false],false,false);
      }
    });

    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:640,height:480});
    await cam.start();
    state.cameraActive=true;
    document.getElementById('stxt').textContent='Activo · 2 manos';
    document.getElementById('sdot').classList.add('on');

  } catch(e) {
    document.getElementById('stxt').textContent='Error: '+e.message;
    document.getElementById('camOvl').classList.remove('hidden');
  }

function updateLoopIndicators(currentMi) {
  INSTRUMENTS.forEach(inst => {

    if(!btn) return;
    if(!loopState[inst.id]) return;
    // Si el compás actual NO tiene datos de este instrumento → está loopeando
    const hasData = (state.tracks[inst.id]||[])[currentMi]?.pattern?.some(Boolean);
    btn.style.boxShadow = (!hasData && loopState[inst.id])
      ? `0 0 8px ${INSTRUMENTS.find(i=>i.id===inst.id)?.color}90`
      : '';
  });
}

// ═══════════════════════════════════════════════════════════════
async function exportAudio(format = 'wav') {
  if(!currentPlan().canSave) { showPaywall('save'); return; }
  
  const maxLen = maxTrackLen();
  if(maxLen === 0) { 
    notify('Primero capturá al menos un compás', 'warning'); 
    return; 
  }

  // Modal de loading
  const loading = document.createElement('div');
  loading.id = 'exportLoading';
  loading.style.cssText = 'position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px';
  loading.innerHTML = `
    <div style="background:linear-gradient(180deg,#1c1c28,#0a0a0f);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:32px;max-width:380px;width:100%;text-align:center">
      <div style="font-size:48px;margin-bottom:14px">🎵</div>
      <h2 style="font-size:18px;font-weight:600;margin:0 0 8px;color:#fff">Renderizando audio...</h2>
      <p id="exportProgress" style="margin:0;color:rgba(255,255,255,0.6);font-size:13px">Preparando samples</p>
      <div style="margin-top:18px;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
        <div id="exportBar" style="width:0%;height:100%;background:linear-gradient(90deg,#0a84ff,#5e5ce6);transition:width .2s"></div>
      </div>
    </div>
  `;
  document.body.appendChild(loading);

  try {
    // 1. Asegurar que todos los samples estén cargados
    document.getElementById('exportProgress').textContent = 'Cargando samples...';
    document.getElementById('exportBar').style.width = '10%';
    await prewarmAllSamples();

    // 2. Calcular duración total
    const beatDur = 60/state.bpm/2; // duración de cada 1/8 de tiempo
    const beatsPerMeasure = 8;       // 8 slots por compás
    const totalDuration = maxLen * beatsPerMeasure * beatDur + 1; // +1s de cola para que el último golpe no se corte
    
    document.getElementById('exportProgress').textContent = `Renderizando ${maxLen} compás${maxLen===1?'':'es'} (${totalDuration.toFixed(1)}s)...`;
    document.getElementById('exportBar').style.width = '30%';

    // 3. Crear OfflineAudioContext
    const sampleRate = 44100;
    const ctx = new OfflineAudioContext(2, Math.ceil(totalDuration * sampleRate), sampleRate);
    
    // 4. Schedulear cada nota
    const volMap = {conga:1.0, surdo:1.1, campana:0.7, clave:0.85, cajon:0.95, semillas:0.8};
    
    for(let mi = 0; mi < maxLen; mi++) {
      const mStart = mi * beatsPerMeasure * beatDur;
      
      for(const inst of INSTRUMENTS) {
        if(muteState[inst.id]) continue;
        
        const track = state.tracks[inst.id] || [];
        let pat = track[mi]?.pattern;
        
        // Si está en loop y este compás no tiene pattern, usar el anterior
        if(!pat && loopState[inst.id]) {
          for(let p = mi-1; p >= 0; p--) {
            if(track[p]?.pattern) { pat = track[p].pattern; break; }
          }
        }
        if(!pat) continue;

        const buf = _sampleBuffers[inst.id];
        if(!buf) continue;

        pat.forEach((on, bi) => {
          if(!on) return;
          const time = mStart + bi * beatDur;
          const velocity = (bi === 0 || bi === 4) ? 1.0 : 0.82;
          
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const gain = ctx.createGain();
          gain.gain.value = velocity * (volMap[inst.id] || 1.0);
          src.connect(gain);
          gain.connect(ctx.destination);
          src.start(time);
        });
      }
    }

    document.getElementById('exportBar').style.width = '60%';
    document.getElementById('exportProgress').textContent = 'Procesando audio...';

    // 5. Renderizar a buffer
    const renderedBuffer = await ctx.startRendering();
    
    document.getElementById('exportBar').style.width = '85%';
    document.getElementById('exportProgress').textContent = 'Generando archivo WAV...';

    // 6. Convertir buffer a WAV blob
    const wavBlob = audioBufferToWav(renderedBuffer);
    
    document.getElementById('exportBar').style.width = '100%';
    document.getElementById('exportProgress').textContent = '¡Listo!';

    // 7. Descargar
    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
    a.download = `percusignal_${ts}.wav`;
    a.href = url;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    setTimeout(() => loading.remove(), 500);
  } catch(e) {
    console.error('Export error:', e);
    loading.remove();
    notify('Error al exportar: ' + e.message, 'error');
  }
}

// Convierte un AudioBuffer a un Blob WAV
function audioBufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const bytesPerSample = bitDepth / 8;
  const blockAlign = numChannels * bytesPerSample;
  
  // Interleaved samples
  const length = buffer.length * numChannels * bytesPerSample;
  const arrayBuffer = new ArrayBuffer(44 + length);
  const view = new DataView(arrayBuffer);
  
  // RIFF header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + length, true);
  writeString(view, 8, 'WAVE');
  
  // fmt chunk
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);            // subchunk size
  view.setUint16(20, format, true);         // PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitDepth, true);
  
  // data chunk
  writeString(view, 36, 'data');
  view.setUint32(40, length, true);
  
  // Write interleaved samples
  let offset = 44;
  const channels = [];
  for(let i = 0; i < numChannels; i++) channels.push(buffer.getChannelData(i));
  
  for(let i = 0; i < buffer.length; i++) {
    for(let c = 0; c < numChannels; c++) {
      let s = Math.max(-1, Math.min(1, channels[c][i]));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      view.setInt16(offset, s, true);
      offset += 2;
    }
  }
  
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
  for(let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

function saveSession() {
  if(!currentPlan().canSave) { showPaywall('save'); return; }
  const session = {
    version: 1,
    bpm: state.bpm,
    compas: state.compas,
    subdiv: state.subdiv,
    tracks: {},
    muteState: {...muteState},
    loopState: {...loopState},
    savedAt: new Date().toISOString(),
  };
  // Serialize tracks (pattern arrays only — no functions)
  INSTRUMENTS.forEach(inst => {
    session.tracks[inst.id] = (state.tracks[inst.id]||[]).map(m => ({
      pattern: m.pattern,
      compas: m.compas,
      rightMask: m.rightMask,
      leftMask: m.leftMask,
      rightFist: m.rightFist,
      leftFist: m.leftFist,
    }));
  });

  const json = JSON.stringify(session, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  a.download = `percusignal_${ts}.json`;
  a.href = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showVoiceFeedback('✓ Sesión guardada');
}

function loadSession() {
  if(!currentPlan().canSave) { showPaywall('save'); return; }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.style.display = 'none';
  const _fsEl = document.fullscreenElement || document.webkitFullscreenElement || document.body;
  _fsEl.appendChild(input);
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const session = JSON.parse(ev.target.result);
        if(!session.version || !session.tracks) throw new Error('Archivo inválido');

        // Restore state
        setBpm(session.bpm || 100);
        state.compas = session.compas || '4/4';
        state.subdiv = session.subdiv || '2';

        // Restore tracks
        INSTRUMENTS.forEach(inst => {
          state.tracks[inst.id] = (session.tracks[inst.id]||[]).map(m => ({
            pattern: m.pattern,
            compas: m.compas || state.compas,
            rightMask: m.rightMask || [false,false,false,false],
            leftMask: m.leftMask || [false,false,false,false],
            rightFist: m.rightFist || false,
            leftFist: m.leftFist || false,
          }));
        });

        // Restore mute/loop
        if(session.muteState) {
          INSTRUMENTS.forEach(inst => {
            muteState[inst.id] = session.muteState[inst.id] || false;
            const btn = document.getElementById('muteBtn_'+inst.id);
            if(btn) {
              const on = muteState[inst.id];
              btn.style.background = on ? 'var(--red)' : 'var(--fill2)';
              btn.style.color = on ? '#fff' : 'var(--label3)';
              btn.style.borderColor = on ? 'var(--red)' : 'var(--separator)';
            }
          });
        }
        if(session.loopState) {
          INSTRUMENTS.forEach(inst => {
            loopState[inst.id] = session.loopState[inst.id] || false;
            const btn = document.getElementById('loopBtn_'+inst.id);
            if(btn) {
              const on = loopState[inst.id];
              btn.style.background = on ? 'var(--green)' : 'var(--fill2)';
              btn.style.color = on ? '#000' : 'var(--label3)';
              btn.style.borderColor = on ? 'var(--green)' : 'var(--separator)';
            }
          });
        }

        // Restore compas segmented control
        document.querySelectorAll('#segCompas .seg-btn').forEach(b => {
          b.classList.toggle('active', b.textContent === state.compas);
        });

        rebuildScoreDisplay();
        showVoiceFeedback('✓ Sesión cargada');
        if(input.parentNode) input.parentNode.removeChild(input);
      } catch(err) {
        notify('Error al cargar: ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
  // Remove if cancelled
  setTimeout(() => { if(input.parentNode) input.parentNode.removeChild(input); }, 60000);
}
</script>
<script>
// Fallback: ejecutar renderPlanBadge + auto-sync de plan con Supabase
(function() {
  function tryRender() {
    if (typeof renderPlanBadge === 'function' && document.getElementById('planBadge')) {
      try { renderPlanBadge(); } catch(e) { console.error('renderPlanBadge:', e); }
      // Bonus: verificar plan en Supabase en background
      syncPlanInBackground();
    } else {
      setTimeout(tryRender, 100);
    }
  }
  
  async function syncPlanInBackground() {
    try {
      const userStr = localStorage.getItem('percusignal_user');
      if(!userStr) return;
      const user = JSON.parse(userStr);
      if(!user.email) return;
      
      const res = await fetch('/api/get-user-plan?email=' + encodeURIComponent(user.email));
      const data = await res.json();
      
      // Si el plan del servidor difiere del local, actualizamos
      if(data.plan && data.plan !== user.plan) {
        console.log('[sync] Plan changed:', user.plan, '→', data.plan);
        if(typeof setUser === 'function') {
          setUser({ email: user.email, plan: data.plan });
          if(data.plan !== 'free' && typeof notify === 'function') {
            notify('Tu plan ' + data.plan.toUpperCase() + ' está activo ✨', 'success', 4000);
          }
        }
      }
    } catch(e) { console.warn('sync plan:', e); }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryRender);
  } else {
    tryRender();
  }
})();
</script>
